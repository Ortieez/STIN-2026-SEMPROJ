services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - CACHE_FILE_PATH=/data/cache.json
      - USER_SETTINGS_PATH=/data/settings.json
      - LOG_FILE_PATH=/data/app.log
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - path: ./frontend/.env
        required: false
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
